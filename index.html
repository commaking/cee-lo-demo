<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cee-Lo by Dices — Game Demo</title>
<meta name="description" content="Cee-Lo (4-5-6) street dice game by Dices. Demo build — play money only." />
<meta property="og:title" content="Cee-Lo by Dices — Game Demo" />
<meta property="og:description" content="Street dice, reimagined. A Dices original — Cee-Lo 4-5-6 with side bets, live betting windows, and full hand hierarchy." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0a0c0e" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ──────────────────────────────────────────────────────────────
   Cee-Lo · Dices — Styles
   Near-black + mint accent, inspired by Shuffle casino dice UI
   ────────────────────────────────────────────────────────────── */

:root {
  --bg: #0a0c0e;
  --surface: #13171b;
  --surface-2: #1a1f25;
  --surface-3: #232931;
  --border: #262c34;
  --border-soft: #1d2229;
  --text: #e8ecef;
  --text-dim: #8b95a0;
  --text-mute: #5c6673;

  --mint: #7BFDEB;
  --mint-soft: rgba(123, 253, 235, 0.15);
  --mint-dim: rgba(123, 253, 235, 0.4);
  --mint-glow: rgba(123, 253, 235, 0.55);

  --win: oklch(0.78 0.18 155);
  --win-soft: oklch(0.78 0.18 155 / 0.12);
  --lose: oklch(0.65 0.22 25);
  --lose-soft: oklch(0.65 0.22 25 / 0.12);
  --push: oklch(0.72 0.12 85);

  --rail-w: 340px;
  --radius: 10px;
  --radius-sm: 6px;

  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --sans: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01', 'cv11';
}
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select { font-family: inherit; color: inherit; background: none; border: none; outline: none; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* ── App shell ────────────────────────────────────────────── */
.app-root {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(1200px 600px at 70% 10%, rgba(123, 253, 235, 0.04), transparent 60%),
    radial-gradient(800px 400px at 10% 90%, rgba(123, 253, 235, 0.025), transparent 60%),
    var(--bg);
}

/* ── Topbar ───────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-soft);
  gap: 16px;
  background: rgba(10, 12, 14, 0.85);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { height: 26px; width: auto; display: block; }
.brand-word {
  font-weight: 800;
  font-size: 19px;
  letter-spacing: -0.02em;
  color: var(--text);
}
.game-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mute);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-left: 4px;
}
.balance-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 13px;
}
.bal-label { color: var(--text-mute); font-size: 10px; letter-spacing: 0.1em; }
.bal-val { color: var(--mint); font-weight: 600; }
.coin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #a8ffee, var(--mint) 70%);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), inset 0 -1px 0 rgba(0,0,0,0.2);
}
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:hover { border-color: var(--mint-dim); color: var(--mint); }
.avatar-dot {
  width: 36px; height: 36px; border-radius: 6px;
  background: linear-gradient(135deg, var(--mint) 0%, #3da898 100%);
  border: 1px solid var(--border);
}

/* ── Main grid ────────────────────────────────────────────── */
.main-grid {
  flex: 1;
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  min-height: 0;
  padding: 18px;
  gap: 16px;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
}

/* ── Bet rail ─────────────────────────────────────────────── */
.bet-rail {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.rail-tabs {
  display: flex;
  padding: 6px;
  gap: 4px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--surface-2);
}
.tab {
  flex: 1;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--text-mute);
  border-radius: var(--radius-sm);
  letter-spacing: 0.02em;
  transition: all .15s;
}
.tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: inset 0 0 0 1px var(--border);
}
.tab:not(.active):hover { color: var(--text-dim); }

.rail-section {
  padding: 16px;
  border-bottom: 1px solid var(--border-soft);
}

/* Amount + fields */
.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.amount-block { margin-bottom: 10px; }
.amount-input {
  display: flex; align-items: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  gap: 8px;
  transition: border-color .15s;
}
.amount-input:focus-within { border-color: var(--mint-dim); }
.amount-input.disabled { opacity: 0.55; pointer-events: none; }
.amount-input input {
  flex: 1;
  font-family: var(--mono);
  font-size: 15px;
  background: transparent;
  color: var(--text);
  width: 100%;
}
.amt-btns { display: flex; gap: 4px; }
.amt-btns button {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface-3);
  transition: all .15s;
}
.amt-btns button:hover:not(:disabled) { color: var(--mint); border-color: var(--mint-dim); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.field-col { min-width: 0; }
.readout {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-dim);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.readout.accent { color: var(--mint); }

/* Side bets */
.sidebets { padding: 16px; flex: 1; overflow-y: auto; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.section-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-dim);
}
.live-pill {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mint);
  background: var(--mint-soft);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.08em;
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.sb-group { margin-bottom: 14px; }
.sb-group:last-child { margin-bottom: 0; }
.sb-group-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.sb-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.sb-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }

.sidebet-chip {
  display: flex; flex-direction: column;
  padding: 8px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  gap: 6px;
  transition: all .15s;
  text-align: left;
  min-height: 52px;
}
.sidebet-chip:hover:not(:disabled) { border-color: var(--mint-dim); transform: translateY(-1px); }
.sidebet-chip:disabled { opacity: 0.4; cursor: not-allowed; }
.sidebet-chip.active {
  background: var(--mint-soft);
  border-color: var(--mint);
  box-shadow: 0 0 0 1px var(--mint-dim), 0 4px 12px rgba(123, 253, 235, 0.08);
}
.sidebet-chip.chip-win {
  border-color: var(--win);
  background: var(--win-soft);
  box-shadow: 0 0 0 1px var(--win), 0 0 16px oklch(0.78 0.18 155 / 0.25);
}
.sidebet-chip.chip-lose {
  border-color: var(--lose);
  background: var(--lose-soft);
  opacity: 0.65;
}
.sb-top { display: flex; align-items: center; justify-content: space-between; }
.sb-label { font-size: 11px; font-weight: 600; color: var(--text); }
.sb-odds {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mint);
  padding: 1px 4px;
  border-radius: 3px;
  background: rgba(123, 253, 235, 0.08);
}
.sidebet-chip.active .sb-odds { background: rgba(10, 12, 14, 0.4); }
.sb-bottom { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.sb-amt {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--mint);
  font-weight: 600;
}
.sb-place {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.05em;
}
.sb-steppers { display: flex; gap: 2px; }
.sb-steppers span {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
  cursor: pointer;
}
.sb-steppers span:hover { color: var(--mint); border-color: var(--mint-dim); }

/* Rail footer */
.rail-footer {
  padding: 16px;
  border-top: 1px solid var(--border-soft);
  background: var(--surface-2);
}
.stake-line {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.stake-val { color: var(--text); font-weight: 600; }
.play-btn {
  width: 100%;
  padding: 14px;
  background: var(--mint);
  color: #031210;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.08em;
  transition: all .15s;
  box-shadow: 0 4px 16px rgba(123, 253, 235, 0.18);
}
.play-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(123, 253, 235, 0.3);
}
.play-btn:disabled { cursor: not-allowed; opacity: 0.7; }
.play-btn.loading {
  background: var(--surface-3);
  color: var(--text-dim);
  box-shadow: none;
  animation: loadingPulse 1.2s infinite;
}
.play-btn.ready {
  background: var(--mint);
  animation: readyPulse 1.4s infinite;
}
@keyframes loadingPulse {
  0%, 100% { background: var(--surface-3); }
  50% { background: var(--surface-2); }
}
@keyframes readyPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(123, 253, 235, 0.18); }
  50% { box-shadow: 0 4px 32px rgba(123, 253, 235, 0.5); }
}

.payout-box {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--mono);
  font-size: 12px;
}
.payout-box.payout-win { border-color: var(--win); background: var(--win-soft); }
.payout-box.payout-lose { border-color: var(--lose); background: var(--lose-soft); }
.payout-box.payout-push { border-color: var(--push); }
.pb-row {
  display: flex; justify-content: space-between;
  padding: 3px 0;
  color: var(--text-dim);
}
.pb-row.total {
  border-top: 1px solid var(--border);
  margin-top: 4px; padding-top: 8px;
  color: var(--text);
  font-weight: 600;
}

/* ── Stage ────────────────────────────────────────────────── */
.stage {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  position: relative;
}
.stage-inner {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 32px;
  gap: 16px;
  background:
    radial-gradient(900px 500px at 50% 50%, rgba(123, 253, 235, 0.03), transparent 70%);
  position: relative;
  overflow: hidden;
}

/* Zone */
.zone {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 24px 28px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.zone-active {
  border-color: var(--mint-dim);
  box-shadow: 0 0 0 1px var(--mint-dim), 0 8px 32px rgba(123, 253, 235, 0.08);
}
.zone-active::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(400px 200px at 50% 50%, rgba(123, 253, 235, 0.06), transparent 70%);
  pointer-events: none;
}
.zone-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.zone-title {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: var(--text-dim);
}
.zone-active .zone-title { color: var(--mint); }
.zone-glyph {
  font-size: 11px;
  color: var(--mint);
}
.zone-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.05em;
  text-transform: lowercase;
}
.zone-body {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 12px 0;
}
.zone-footer {
  display: flex; justify-content: center;
  min-height: 28px;
}

/* Dice */
.dice-row { display: flex; gap: 16px; }
.die {
  background: linear-gradient(160deg, #1a2026, #0e1215);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 4px 12px rgba(0,0,0,0.5);
  position: relative;
  transition: transform .2s;
}
.die::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 50%);
  border-radius: inherit;
  pointer-events: none;
}
.die-rolling {
  animation: diceShake 0.25s infinite;
  border-color: var(--mint-dim);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 4px 12px rgba(0,0,0,0.5),
    0 0 20px rgba(123, 253, 235, 0.2);
}
@keyframes diceShake {
  0% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(-1px, -2px) rotate(-2deg); }
  50% { transform: translate(2px, 1px) rotate(2deg); }
  75% { transform: translate(-1px, 2px) rotate(-1deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

/* Result badge */
.result-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface-3);
  color: var(--text-dim);
}
.result-badge.placeholder { color: var(--text-mute); background: transparent; border-style: dashed; }
.result-badge.tone-hot {
  color: var(--mint);
  border-color: var(--mint);
  background: var(--mint-soft);
  box-shadow: 0 0 12px rgba(123, 253, 235, 0.15);
}
.result-badge.tone-cold {
  color: var(--lose);
  border-color: var(--lose);
  background: var(--lose-soft);
}
.result-badge.tone-mute { color: var(--text-mute); }
.point-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--mint);
  padding: 1px 6px;
  background: rgba(10, 12, 14, 0.35);
  border-radius: 3px;
}

/* VS divider */
.vs-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 4px 0;
}
.vs-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.vs-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--text-mute);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  min-width: 140px;
  text-align: center;
  transition: all .25s;
}
.vs-win .vs-label { color: var(--win); border-color: var(--win); background: var(--win-soft); }
.vs-lose .vs-label { color: var(--lose); border-color: var(--lose); background: var(--lose-soft); }
.vs-push .vs-label { color: var(--push); border-color: var(--push); }

/* Tap-ready player zone */
.player-zone-wrap { position: relative; flex: 1; display: flex; }
.player-zone-wrap .zone { flex: 1; }
.player-zone-wrap.tap-ready { cursor: pointer; }
.player-zone-wrap.tap-ready .zone {
  cursor: pointer;
  border-color: var(--mint);
  box-shadow: 0 0 0 1px var(--mint), 0 8px 40px rgba(123, 253, 235, 0.2);
  animation: tapPulse 1.6s infinite;
}
.player-zone-wrap.tap-ready:hover .zone {
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px var(--mint), 0 12px 50px rgba(123, 253, 235, 0.3);
}
@keyframes tapPulse {
  0%, 100% { box-shadow: 0 0 0 1px var(--mint), 0 8px 40px rgba(123, 253, 235, 0.15); }
  50% { box-shadow: 0 0 0 1px var(--mint), 0 8px 50px rgba(123, 253, 235, 0.35); }
}
.tap-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--mint);
  background: rgba(10, 12, 14, 0.85);
  padding: 6px 14px;
  border: 1px solid var(--mint);
  border-radius: 4px;
  pointer-events: none;
  opacity: 0.92;
  backdrop-filter: blur(4px);
}

/* Flash banner */
.flash {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  background: rgba(10, 12, 14, 0.55);
  backdrop-filter: blur(3px);
  z-index: 5;
  animation: flashIn 0.4s cubic-bezier(.2,.8,.2,1);
  pointer-events: none;
}
@keyframes flashIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}
.flash-glyph {
  font-family: var(--mono);
  font-size: 48px;
  letter-spacing: 0.1em;
  color: var(--text);
}
.flash-msg {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
.flash-win .flash-glyph { color: var(--mint); text-shadow: 0 0 40px rgba(123, 253, 235, 0.6); }
.flash-win .flash-msg { color: var(--mint); text-shadow: 0 0 40px rgba(123, 253, 235, 0.6); }
.flash-lose .flash-glyph, .flash-lose .flash-msg { color: var(--lose); }
.flash-push .flash-glyph, .flash-push .flash-msg { color: var(--push); }
.flash-err .flash-msg { color: var(--lose); font-size: 24px; }

/* History strip */
.history-strip {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--surface-2);
  border-top: 1px solid var(--border-soft);
  min-height: 48px;
}
.hs-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-mute);
  flex-shrink: 0;
}
.hs-placeholder {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mute);
  font-style: italic;
}
.hs-scroller {
  display: flex; gap: 6px;
  overflow-x: auto;
  flex: 1;
  scrollbar-width: none;
}
.hs-scroller::-webkit-scrollbar { display: none; }
.hs-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface);
  flex-shrink: 0;
  color: var(--text-dim);
}
.hs-chip.hs-win { border-color: var(--win); color: var(--win); background: var(--win-soft); }
.hs-chip.hs-lose { border-color: var(--lose); color: var(--lose); background: var(--lose-soft); }
.hs-chip.hs-push { border-color: var(--push); color: var(--push); }
.hs-vs { opacity: 0.5; font-size: 9px; }
.hs-net { font-weight: 700; margin-left: 4px; }

/* Bottom strip */
.bottom-strip {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border-soft);
  cursor: pointer;
  transition: background .15s;
}
.bottom-strip:hover { background: var(--surface-2); }
.bs-left { display: flex; align-items: center; gap: 10px; }
.bs-title { font-weight: 600; font-size: 13px; }
.bs-tag {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-mute);
  padding: 2px 6px;
  background: var(--surface-2);
  border-radius: 3px;
  letter-spacing: 0.08em;
}
.bs-right { display: flex; align-items: center; gap: 14px; font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.bs-odds { color: var(--mint); font-weight: 600; }
.bs-fair { letter-spacing: 0.05em; }

/* Rules drawer */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(3, 5, 7, 0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; justify-content: flex-end;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.drawer {
  width: 480px; max-width: 90vw;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  animation: slideIn .3s cubic-bezier(.2,.8,.2,1);
  overflow: hidden;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.drawer-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border-soft);
}
.drawer-head h2 { margin: 0; font-size: 18px; letter-spacing: -0.01em; }
.x-btn {
  width: 32px; height: 32px; border-radius: 6px;
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.x-btn:hover { color: var(--mint); border-color: var(--mint-dim); }
.drawer-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
.drawer-body section { margin-bottom: 22px; }
.drawer-body h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin: 0 0 10px;
}
.drawer-body p { margin: 0; color: var(--text-dim); line-height: 1.55; font-size: 13px; }
.rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.rule-card {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}
.rule-badge {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-mute);
  margin-bottom: 4px;
}
.rule-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.rule-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.rule-hot { border-color: var(--mint); background: var(--mint-soft); }
.rule-hot .rule-badge { color: var(--mint); }
.rule-cold { border-color: var(--lose); background: var(--lose-soft); }
.rule-cold .rule-badge { color: var(--lose); }
.hier-list {
  list-style: none; padding: 0; margin: 0;
  font-family: var(--mono); font-size: 12px;
}
.hier-list li {
  display: flex; gap: 10px;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text-dim);
}
.hier-list li span {
  color: var(--mint);
  font-weight: 700;
  min-width: 18px;
}

/* Tweaks panel */
.tweaks-panel {
  position: fixed;
  bottom: 18px; right: 18px;
  width: 320px;
  background: var(--surface);
  border: 1px solid var(--mint-dim);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(123, 253, 235, 0.15);
  z-index: 50;
  animation: tweaksIn .2s ease-out;
}
@keyframes tweaksIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.tp-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  color: var(--mint); text-transform: uppercase;
}
.tp-head button { color: var(--text-dim); }
.tp-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.tp-field { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-dim); }
.tp-field.toggle { flex-direction: row; justify-content: space-between; align-items: center; }
.tp-slider-row { display: flex; align-items: center; gap: 10px; }
.tp-slider-row input[type=range] { flex: 1; accent-color: var(--mint); }
.tp-val { font-family: var(--mono); color: var(--mint); font-size: 11px; min-width: 36px; text-align: right; }
.tp-field select {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 12px;
}
.tp-field input[type=checkbox] { accent-color: var(--mint); width: 16px; height: 16px; }
.tp-hint { font-family: var(--mono); font-size: 10px; color: var(--text-mute); padding-top: 4px; border-top: 1px solid var(--border-soft); }

/* Responsive */
@media (max-width: 960px) {
  .main-grid {
    grid-template-columns: 1fr;
    padding: 12px;
    gap: 12px;
  }
  .bet-rail { max-height: none; order: 2; }
  .stage { order: 1; min-height: 60vh; }
  .stage-inner { padding: 18px; }
  .zone { padding: 16px; }
  .dice-row { gap: 10px; }
  .flash-msg { font-size: 38px; }
}
@media (max-width: 520px) {
  .topbar { padding: 10px 12px; gap: 8px; }
  .brand-word { display: none; }
  .game-tag { display: none; }
  .balance-pill { padding: 5px 10px; }
  .sb-grid-4 { grid-template-columns: 1fr 1fr; }
  .flash-msg { font-size: 28px; }
  .flash-glyph { font-size: 32px; }
}

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// Cee-Lo game logic — rules, roll evaluation, state machine
// ─────────────────────────────────────────────────────────────

const rand6 = () => 1 + Math.floor(Math.random() * 6);
const rollDice = () => [rand6(), rand6(), rand6()];

// Evaluate a 3-dice roll into a canonical outcome.
// Returns: { kind, point?, label, rank }
//   kind: 'cee-lo' | 'trips' | 'pair6' | 'point' | 'pair1' | 'bust' | 'dead'
function evaluateRoll(dice) {
  const sorted = [...dice].sort((a, b) => a - b);
  const [a, b, c] = sorted;

  // Trips
  if (a === b && b === c) {
    return {
      kind: 'trips',
      value: a,
      label: a === 6 ? 'TRIP SIXES' : `TRIPS ${a}s`,
      rank: a === 6 ? 1 : 2 - a / 100, // higher trip wins
    };
  }
  // 4-5-6 Cee-Lo
  if (a === 4 && b === 5 && c === 6) {
    return { kind: 'cee-lo', label: 'CEE-LO', rank: 3 };
  }
  // 1-2-3 bust
  if (a === 1 && b === 2 && c === 3) {
    return { kind: 'bust', label: 'ACE OUT', rank: 100 };
  }
  // Pair detection
  let pair = null, odd = null;
  if (a === b) { pair = a; odd = c; }
  else if (b === c) { pair = b; odd = a; }

  if (pair !== null) {
    if (odd === 6) return { kind: 'pair6', label: 'HEADCRACK', rank: 4 };
    if (odd === 1) return { kind: 'pair1', label: 'ACED OUT', rank: 99 };
    // Point 2/3/4/5
    return {
      kind: 'point',
      point: odd,
      label: `POINT ${odd}`,
      rank: 10 - odd, // point 5 = rank 5 (best point), point 2 = rank 8 (worst)
    };
  }
  // Dead roll
  return { kind: 'dead', label: 'DEAD ROLL', rank: 50 };
}

const isInstantWin = (r) => r.kind === 'cee-lo' || r.kind === 'trips' || r.kind === 'pair6';
const isInstantLoss = (r) => r.kind === 'bust' || r.kind === 'pair1';
const isPoint = (r) => r.kind === 'point';
const isDead = (r) => r.kind === 'dead';

// Compare two results (house vs player). Returns 'win' | 'lose' | 'push' from PLAYER's perspective.
function comparePlayerVsHouse(house, player) {
  if (isInstantWin(player) && !isInstantWin(house)) return 'win';
  if (isInstantWin(house) && !isInstantWin(player)) return 'lose';
  if (isInstantWin(house) && isInstantWin(player)) {
    // Both instant wins — lower rank = higher outcome
    if (player.rank < house.rank) return 'win';
    if (player.rank > house.rank) return 'lose';
    return 'push';
  }
  if (isInstantLoss(player)) return 'lose';
  if (isInstantLoss(house)) return 'win';
  // Both set points
  if (player.point > house.point) return 'win';
  if (player.point < house.point) return 'lose';
  return 'push';
}

// Side bet payout odds (approximate, tuned)
const SIDE_BETS = {
  over3:    { label: 'Over 3.5',    odds: 1.1, group: 'overunder' },
  under3:   { label: 'Under 3.5',   odds: 2.8, group: 'overunder' },
  exact2:   { label: 'Exact 2',     odds: 8,   group: 'exact' },
  exact3:   { label: 'Exact 3',     odds: 8,   group: 'exact' },
  exact4:   { label: 'Exact 4',     odds: 8,   group: 'exact' },
  exact5:   { label: 'Exact 5',     odds: 8,   group: 'exact' },
  headcrack:{ label: 'Headcrack',   odds: 7,   group: 'special' },
  aceout:   { label: 'Ace Out',     odds: 9,   group: 'special' },
  tripsix:  { label: 'Trip Sixes',  odds: 200, group: 'special' },
  push:     { label: 'Push',        odds: 10,  group: 'special' },
};

// Evaluate a side bet given final house + player results.
function resolveSideBet(betKey, house, player) {
  const p = player;
  const h = house;
  switch (betKey) {
    case 'over3':  return isPoint(p) && p.point > 3;
    case 'under3': return isPoint(p) && p.point <= 3;
    case 'exact2': return isPoint(p) && p.point === 2;
    case 'exact3': return isPoint(p) && p.point === 3;
    case 'exact4': return isPoint(p) && p.point === 4;
    case 'exact5': return isPoint(p) && p.point === 5;
    case 'headcrack': return isInstantWin(p);
    case 'aceout':    return isInstantLoss(p);
    case 'tripsix':   return p.kind === 'trips' && p.value === 6;
    case 'push': {
      return isPoint(h) && isPoint(p) && h.point === p.point;
    }
    default: return false;
  }
}

// Main bet payout multiplier based on win type.
// Standard 1:1, with boosted payouts for 4-5-6 (2x), Trips (3x), Trip Sixes (5x).
function mainBetPayout(outcome, playerResult) {
  if (outcome !== 'win') return outcome === 'push' ? 1 : 0;
  if (playerResult.kind === 'trips' && playerResult.value === 6) return 1 + 5;
  if (playerResult.kind === 'trips') return 1 + 3;
  if (playerResult.kind === 'cee-lo') return 1 + 2;
  return 1 + 1; // standard 1:1 (return stake + 1x)
}

window.CeeLo = {
  rollDice, evaluateRoll,
  isInstantWin, isInstantLoss, isPoint, isDead,
  comparePlayerVsHouse,
  SIDE_BETS, resolveSideBet, mainBetPayout,
};

</script>

const { useState, useEffect, useRef, useMemo } = React;

  const pipPositions = {

    2: [[0.25, 0.25], [0.75, 0.75]],
    3: [[0.25, 0.25], [0.5, 0.5], [0.75, 0.75]],
    4: [[0.25, 0.25], [0.75, 0.25], [0.25, 0.75], [0.75, 0.75]],

    6: [[0.25, 0.22], [0.25, 0.5], [0.25, 0.78], [0.75, 0.22], [0.75, 0.5], [0.75, 0.78]],
  };
  const pipR = size * 0.075;
  const pips = pipPositions[displayVal] || [];

  return (
    <div
      className={`die ${rolling ? 'die-rolling' : ''}`}
      style={{ width: size, height: size, borderRadius: size * 0.18 }}
    >
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>

// ── Dice row ──────────────────────────────────────────────────
function DiceRow({ dice, rolling, size = 64 }) {

    <div className="dice-row">
      {dice.map((v, i) => (
        <Die key={i} value={v} rolling={rolling} size={size} delay={i * 60} />
      ))}

}

// ── Result label badge ────────────────────────────────────────
function ResultBadge({ result, variant }) {
  if (!result) return <div className="result-badge placeholder">—</div>;
  const tone =
    result.kind === 'cee-lo' || result.kind === 'trips' || result.kind === 'pair6' ? 'hot' :
    result.kind === 'bust' || result.kind === 'pair1' ? 'cold' :
    result.kind === 'dead' ? 'mute' : 'neutral';
  return (
    <div className={`result-badge tone-${tone} ${variant || ''}`}>
      {result.label}
      {result.kind === 'point' && <span className="point-val">{result.point}</span>}

  );
}

// ── Zone (House or Player) ────────────────────────────────────
function Zone({ title, subtitle, dice, rolling, result, active, glyph, side }) {

    <div className={`zone ${active ? 'zone-active' : ''} zone-${side}`}>

      <div className="zone-footer">
        <ResultBadge result={result} />
      </div>

}

// ── VS divider ────────────────────────────────────────────────
function VsDivider({ phase, outcome }) {
  const label =
    outcome === 'win' ? 'YOU WIN' :
    outcome === 'lose' ? 'HOUSE WINS' :
    outcome === 'push' ? 'PUSH' :
    phase === 'idle' ? 'READY' :
    phase === 'house-rolling' ? 'HOUSE ROLLING' :
    phase === 'point-set' ? 'BEAT THE POINT' :
    phase === 'second-window' ? 'LIVE BETS OPEN' :
    phase === 'player-rolling' ? 'YOUR ROLL' :
    'VS';
  const tone =
    outcome === 'win' ? 'win' : outcome === 'lose' ? 'lose' : outcome === 'push' ? 'push' : 'neutral';
  return (
    <div className={`vs-divider vs-${tone}`}>
      <div className="vs-line" />
      <div className="vs-label">{label}</div>
      <div className="vs-line" />
    </div>
  );
}

// ── Amount input ──────────────────────────────────────────────
function AmountInput({ value, onChange, label = 'Wager', disabled }) {
  return (
    <div className="amount-block">
      <label className="field-label">{label}</label>
      <div className={`amount-input ${disabled ? 'disabled' : ''}`}>
        <span className="coin-dot" />
        <input
          type="number"
          value={value}
          onChange={(e) => onChange(Math.max(0, Number(e.target.value)))}
          disabled={disabled}
          step="0.5"
          min="0"
        />
        <div className="amt-btns">
          <button onClick={() => onChange(Math.max(0, value / 2))} disabled={disabled}>½</button>
          <button onClick={() => onChange(value * 2)} disabled={disabled}>2×</button>
        </div>
      </div>
    </div>
  );
}

// ── Side bet chip ─────────────────────────────────────────────
function SideBetChip({ keyName, def, amount, onSet, disabled, resolved }) {
  const active = amount > 0;
  const tone = resolved === 'win' ? 'chip-win' : resolved === 'lose' ? 'chip-lose' : '';
  return (
    <button
      className={`sidebet-chip ${active ? 'active' : ''} ${tone}`}
      disabled={disabled}
      onClick={() => {
        if (amount > 0) onSet(0);
        else onSet(1); // default 1 unit
      }}
    >
      <div className="sb-top">
        <span className="sb-label">{def.label}</span>
        <span className="sb-odds">{def.odds}×</span>
      </div>
      <div className="sb-bottom">
        {amount > 0 ? <span className="sb-amt">▴ {amount.toFixed(2)}</span> : <span className="sb-place">tap to bet</span>}
        {amount > 0 && (
          <div className="sb-steppers" onClick={(e) => e.stopPropagation()}>
            <span onClick={() => onSet(Math.max(0, amount - 1))}>−</span>
            <span onClick={() => onSet(amount + 1)}>+</span>
          </div>
        )}
      </div>
    </button>
  );
}

window.CeeLoUI = { Die, DiceRow, ResultBadge, Zone, VsDivider, AmountInput, SideBetChip };

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// Cee-Lo app — orchestrates the round and renders everything
// ─────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { Die, DiceRow, ResultBadge, Zone, VsDivider, AmountInput, SideBetChip } = window.CeeLoUI;
const {
  rollDice, evaluateRoll,
  isInstantWin, isInstantLoss, isPoint, isDead,
  comparePlayerVsHouse,
  SIDE_BETS, resolveSideBet, mainBetPayout,
} = window.CeeLo;

// Tweakable defaults (persisted by host)
const TWEAKS = /*EDITMODE-BEGIN*/{
  "animationSpeed": 1.0,
  "showSideBets": true,
  "showSecondWindow": true,
  "forceOutcome": "off"
}/*EDITMODE-END*/;

const SPEED_MS = (base) => Math.round(base / (TWEAKS.animationSpeed || 1));

// ── Phases ─────────────────────────────────────────────────
//   idle → bet-placed → house-rolling → [point-set → second-window →]
//   player-rolling → resolved
const PHASES = {
  idle: 'idle',
  betPlaced: 'bet-placed',
  houseRolling: 'house-rolling',
  pointSet: 'point-set',
  secondWindow: 'second-window',
  playerRolling: 'player-rolling',
  resolved: 'resolved',
};

// ── Roll until non-dead helper (with a limit to be safe) ──
function rollUntilValid() {
  const attempts = [];
  for (let i = 0; i < 40; i++) {
    const dice = rollDice();
    const r = evaluateRoll(dice);
    attempts.push({ dice, r });
    if (!isDead(r)) return { dice, r, attempts };
  }
  const last = attempts[attempts.length - 1];
  return { ...last, attempts };
}

// ── Force-outcome helpers for demo tweaks ─────────────────
function forceDice(outcome) {
  switch (outcome) {
    case 'win':    return [4, 5, 6];
    case 'lose':   return [1, 2, 3];
    case 'push':   return [3, 3, 5]; // will be matched by partner force
    case 'headcrack': return [4, 5, 6];
    case 'trips':  return [6, 6, 6];
    case 'bust':   return [1, 2, 3];
    case 'point':  return [3, 3, 4];
    default: return null;
  }
}

// ──────────────────────────────────────────────────────────
function App() {
  const [balance, setBalance] = useState(1000);
  const [wager, setWager] = useState(10);
  const [sideBetAmts, setSideBetAmts] = useState({}); // {key: amount}
  const [phase, setPhase] = useState(PHASES.idle);

  const [houseDice, setHouseDice] = useState([1, 1, 1]);
  const [houseResult, setHouseResult] = useState(null);
  const [houseRolling, setHouseRolling] = useState(false);
  const [houseAttempts, setHouseAttempts] = useState(0);

  const [playerDice, setPlayerDice] = useState([1, 1, 1]);
  const [playerResult, setPlayerResult] = useState(null);
  const [playerRolling, setPlayerRolling] = useState(false);
  const [playerAttempts, setPlayerAttempts] = useState(0);

  const [outcome, setOutcome] = useState(null); // 'win' | 'lose' | 'push'
  const [payoutBreakdown, setPayoutBreakdown] = useState(null);
  const [history, setHistory] = useState([]);
  const [showRules, setShowRules] = useState(false);
  const [flash, setFlash] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweakVals, setTweakVals] = useState(TWEAKS);

  // ── Tweaks live-update ─────────────────────────────────
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    // Apply tweaks live
    TWEAKS.animationSpeed = tweakVals.animationSpeed;
    TWEAKS.showSideBets = tweakVals.showSideBets;
    TWEAKS.showSecondWindow = tweakVals.showSecondWindow;
    TWEAKS.forceOutcome = tweakVals.forceOutcome;
  }, [tweakVals]);

  const setTweak = (key, val) => {
    setTweakVals((p) => ({ ...p, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  // ── Side bet helpers ───────────────────────────────────
  const totalSideBets = Object.values(sideBetAmts).reduce((a, b) => a + b, 0);
  const setSideBet = (k, amt) => {
    setSideBetAmts((p) => {
      const n = { ...p };
      if (amt <= 0) delete n[k];
      else n[k] = amt;
      return n;
    });
  };

  // ── Start round ────────────────────────────────────────
  const canPlaceBet = phase === PHASES.idle && (wager > 0 || totalSideBets > 0);
  const totalStake = wager + totalSideBets;

  const placeBet = async () => {
    if (!canPlaceBet) return;
    if (totalStake > balance) { setFlash({ type: 'err', msg: 'Not enough balance' }); setTimeout(() => setFlash(null), 1500); return; }
    setBalance((b) => b - totalStake);
    setPhase(PHASES.betPlaced);
    setOutcome(null);
    setPayoutBreakdown(null);
    setHouseResult(null);
    setPlayerResult(null);
    setHouseAttempts(0);
    setPlayerAttempts(0);

    // House auto-rolls after short beat
    await sleep(SPEED_MS(450));
    await houseRoll();
  };

  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  // ── House roll (auto) ──────────────────────────────────
  const houseRoll = async () => {
    setPhase(PHASES.houseRolling);
    setHouseRolling(true);

    // Keep rolling until non-dead (with visible reroll attempts)
    let attempts = 0;
    let finalDice, finalR;
    for (let i = 0; i < 10; i++) {
      attempts++;
      setHouseAttempts(attempts);
      await sleep(SPEED_MS(900));
      let dice;
      // Forced outcomes for demo
      if (i === 0 && TWEAKS.forceOutcome !== 'off') {
        const forced = forceDice(TWEAKS.forceOutcome === 'push' ? 'point' : (TWEAKS.forceOutcome === 'win' || TWEAKS.forceOutcome === 'player-headcrack' ? 'point' : TWEAKS.forceOutcome));
        dice = forced || rollDice();
      } else {
        dice = rollDice();
      }
      const r = evaluateRoll(dice);
      setHouseDice(dice);
      if (!isDead(r)) {
        setHouseRolling(false);
        setHouseResult(r);
        finalDice = dice; finalR = r;
        break;
      }
      // dead — brief pause then reroll
      await sleep(SPEED_MS(450));
    }
    await sleep(SPEED_MS(600));

    // If house instant-win/instant-loss, resolve now
    if (isInstantWin(finalR) || isInstantLoss(finalR)) {
      // Player doesn't roll — but we still visually set player "blank"
      await resolveRound(finalR, null);
      return;
    }

    // Point set — offer second betting window (if enabled), then prompt player to tap
    if (isPoint(finalR)) {
      setPhase(PHASES.pointSet);
      if (TWEAKS.showSideBets && TWEAKS.showSecondWindow) {
        setPhase(PHASES.secondWindow);
      }
    }
  };

  // ── Player roll (manual tap) ───────────────────────────
  const playerRoll = async () => {
    if (phase !== PHASES.pointSet && phase !== PHASES.secondWindow) return;
    setPhase(PHASES.playerRolling);
    setPlayerRolling(true);

    let attempts = 0;
    let finalDice, finalR;
    for (let i = 0; i < 10; i++) {
      attempts++;
      setPlayerAttempts(attempts);
      await sleep(SPEED_MS(900));
      let dice;
      if (i === 0 && TWEAKS.forceOutcome !== 'off') {
        // force player outcome to align with tweak
        if (TWEAKS.forceOutcome === 'win') dice = [4, 5, 6];
        else if (TWEAKS.forceOutcome === 'lose') dice = [1, 2, 3];
        else if (TWEAKS.forceOutcome === 'push' && houseResult?.kind === 'point') dice = [3, 3, houseResult.point];
        else if (TWEAKS.forceOutcome === 'trips') dice = [6, 6, 6];
        else if (TWEAKS.forceOutcome === 'headcrack') dice = [4, 4, 6];
        else dice = rollDice();
      } else dice = rollDice();
      const r = evaluateRoll(dice);
      setPlayerDice(dice);
      if (!isDead(r)) {
        setPlayerRolling(false);
        setPlayerResult(r);
        finalDice = dice; finalR = r;
        break;
      }
      await sleep(SPEED_MS(450));
    }
    await sleep(SPEED_MS(600));
    await resolveRound(houseResult, finalR);
  };

  // ── Resolve & settle ───────────────────────────────────
  const resolveRound = async (hR, pR) => {
    // Determine main bet outcome
    let mainOutcome = 'lose';
    if (pR === null) {
      // House alone decides
      if (isInstantWin(hR)) mainOutcome = 'lose';
      else if (isInstantLoss(hR)) mainOutcome = 'win';
    } else {
      mainOutcome = comparePlayerVsHouse(hR, pR);
    }

    setOutcome(mainOutcome);

    // Payouts
    const mainMult = mainBetPayout(mainOutcome, pR || hR);
    const mainPayout = wager * mainMult;

    // Side bets — resolve against (house, effective player)
    // If player didn't roll, treat "player's outcome" as the house's (for aceOut/headcrack
    // bets referring to house auto-resolution). To keep semantics clean, side bets are
    // evaluated against the last-known roller: if house instant-won/lost, side bets
    // reference the house roll.
    const effectivePlayer = pR || hR;
    const sideRes = {};
    let sidePayoutTotal = 0;
    for (const k of Object.keys(sideBetAmts)) {
      const amt = sideBetAmts[k];
      const hit = resolveSideBet(k, hR, effectivePlayer);
      sideRes[k] = hit ? 'win' : 'lose';
      if (hit) sidePayoutTotal += amt * (1 + SIDE_BETS[k].odds);
    }

    const totalReturn = mainPayout + sidePayoutTotal;
    setPayoutBreakdown({
      mainOutcome, mainMult, mainPayout, sideRes, sidePayoutTotal, totalReturn,
      netChange: totalReturn - totalStake,
    });

    setBalance((b) => b + totalReturn);
    setPhase(PHASES.resolved);

    // History
    setHistory((h) => [
      {
        id: Date.now(),
        house: hR, player: pR,
        outcome: mainOutcome,
        net: totalReturn - totalStake,
        wager: totalStake,
      },
      ...h,
    ].slice(0, 24));

    // Flash banner
    const flashMsg = mainOutcome === 'win'
      ? (pR?.kind === 'cee-lo' ? 'CEE-LO!' : pR?.kind === 'trips' && pR.value === 6 ? 'TRIP SIXES!' : pR?.kind === 'trips' ? 'TRIPS!' : pR?.kind === 'pair6' ? 'HEADCRACK!' : 'WIN')
      : mainOutcome === 'lose' ? (pR?.kind === 'bust' || pR?.kind === 'pair1' ? 'ACE OUT' : 'HOUSE WINS') : 'PUSH';
    setFlash({ type: mainOutcome, msg: flashMsg });
    setTimeout(() => setFlash(null), 2600);
  };

  // ── Reset for next round ──────────────────────────────
  const nextRound = () => {
    setPhase(PHASES.idle);
    setHouseDice([1, 1, 1]);
    setPlayerDice([1, 1, 1]);
    setHouseResult(null);
    setPlayerResult(null);
    setOutcome(null);
    setPayoutBreakdown(null);
    setSideBetAmts({});
    setHouseAttempts(0);
    setPlayerAttempts(0);
  };

  // ── Derived ─────────────────────────────────────────────
  const houseActive = [PHASES.houseRolling, PHASES.pointSet, PHASES.secondWindow].includes(phase);
  const playerActive = [PHASES.playerRolling, PHASES.pointSet, PHASES.secondWindow].includes(phase);
  const canTapToRoll = phase === PHASES.pointSet || phase === PHASES.secondWindow;

  const houseSubtitle =
    phase === PHASES.houseRolling && houseAttempts > 1 ? `RE-ROLL · attempt ${houseAttempts}` :
    phase === PHASES.houseRolling ? 'rolling the bones…' :
    houseResult ? (isPoint(houseResult) ? `point to beat: ${houseResult.point}` : houseResult.label) :
    'waiting on your bet';

  const playerSubtitle =
    phase === PHASES.playerRolling && playerAttempts > 1 ? `RE-ROLL · attempt ${playerAttempts}` :
    phase === PHASES.playerRolling ? 'shake \'em up…' :
    canTapToRoll ? 'TAP DICE TO ROLL' :
    playerResult ? playerResult.label :
    phase === PHASES.resolved ? '—' :
    phase === PHASES.idle ? 'place your bets' :
    '—';

  // ── Phase-gated bet locks ──────────────────────────────

          <span className="brand-word">Dices</span>
          <span className="game-tag">Cee-Lo · 4-5-6</span>
        </div>
        <div className="balance-pill">
          <span className="bal-label">BALANCE</span>
          <span className="coin-dot" />
          <span className="bal-val">{balance.toFixed(2)}</span>
        </div>
        <div className="topbar-actions">
          <button className="icon-btn" onClick={() => setShowRules(true)} title="Rules">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="12" cy="12" r="9" />
              <path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4" />
              <circle cx="12" cy="17" r="0.6" fill="currentColor" />
            </svg>
          </button>
          <button className="icon-btn" title="Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M21 12a8 8 0 1 1-3.8-6.8L21 4l-1.2 3.8A8 8 0 0 1 21 12z" />
            </svg>
          </button>
          <div className="avatar-dot" />
        </div>
      </header>

      {/* ── Main two-column layout ── */}
      <main className="main-grid">
        {/* ── Left bet rail ── */}
        <aside className="bet-rail">
          <div className="rail-tabs">
            <button className="tab active">Manual</button>
            <button className="tab">Auto</button>
            <button className="tab">Advanced</button>
          </div>

          <div className="rail-section">
            <AmountInput value={wager} onChange={setWager} label="MAIN WAGER" disabled={mainBetLocked} />
            <div className="field-row">
              <div className="field-col">
                <label className="field-label">POTENTIAL (1:1)</label>
                <div className="readout">{(wager * 2).toFixed(2)}</div>
              </div>
              <div className="field-col">
                <label className="field-label">CEE-LO (2:1)</label>
                <div className="readout accent">{(wager * 3).toFixed(2)}</div>
              </div>
            </div>
          </div>

          {TWEAKS.showSideBets && (
            <div className="rail-section sidebets">
              <div className="section-head">
                <span className="section-title">SIDE BETS</span>
                {phase === PHASES.secondWindow && <span className="live-pill">● LIVE WINDOW</span>}
              </div>

              <div className="sb-group">
                <div className="sb-group-label">over / under</div>
                <div className="sb-grid-2">
                  {['under3', 'over3'].map((k) => (
                    <SideBetChip
                      key={k} keyName={k} def={SIDE_BETS[k]}
                      amount={sideBetAmts[k] || 0}
                      onSet={(a) => setSideBet(k, a)}
                      disabled={sideBetLocked && !(phase === PHASES.secondWindow && liveAvailable.has(k))}
                      resolved={phase === PHASES.resolved && payoutBreakdown?.sideRes?.[k]}
                    />
                  ))}
                </div>
              </div>

              <div className="sb-group">
                <div className="sb-group-label">exact point</div>
                <div className="sb-grid-4">
                  {['exact2', 'exact3', 'exact4', 'exact5'].map((k) => (
                    <SideBetChip
                      key={k} keyName={k} def={SIDE_BETS[k]}
                      amount={sideBetAmts[k] || 0}
                      onSet={(a) => setSideBet(k, a)}
                      disabled={sideBetLocked && !(phase === PHASES.secondWindow && liveAvailable.has(k))}
                      resolved={phase === PHASES.resolved && payoutBreakdown?.sideRes?.[k]}
                    />
                  ))}
                </div>
              </div>

              <div className="sb-group">
                <div className="sb-group-label">specials</div>
                <div className="sb-grid-2">
                  {['headcrack', 'aceout', 'tripsix', 'push'].map((k) => (
                    <SideBetChip
                      key={k} keyName={k} def={SIDE_BETS[k]}
                      amount={sideBetAmts[k] || 0}
                      onSet={(a) => setSideBet(k, a)}
                      disabled={sideBetLocked && !(phase === PHASES.secondWindow && liveAvailable.has(k))}
                      resolved={phase === PHASES.resolved && payoutBreakdown?.sideRes?.[k]}
                    />
                  ))}
                </div>
              </div>
            </div>
          )}

          <div className="rail-footer">
            <div className="stake-line">
              <span>TOTAL STAKE</span>
              <span className="stake-val">▴ {totalStake.toFixed(2)}</span>
            </div>

            {phase === PHASES.idle && (
              <button className="play-btn" onClick={placeBet} disabled={!canPlaceBet}>
                PLACE BET · ROLL
              </button>
            )}
            {phase === PHASES.resolved && (
              <button className="play-btn" onClick={nextRound}>
                NEXT ROUND
              </button>
            )}
            {(phase === PHASES.betPlaced || phase === PHASES.houseRolling) && (
              <button className="play-btn loading" disabled>
                HOUSE ROLLING…
              </button>
            )}
            {(phase === PHASES.pointSet || phase === PHASES.secondWindow) && (
              <button className="play-btn ready" onClick={playerRoll}>
                {phase === PHASES.secondWindow ? 'ROLL YOUR DICE · LOCK SIDES' : 'ROLL YOUR DICE'}
              </button>
            )}
            {phase === PHASES.playerRolling && (
              <button className="play-btn loading" disabled>
                ROLLING…
              </button>
            )}

            {payoutBreakdown && (
              <div className={`payout-box payout-${payoutBreakdown.mainOutcome}`}>
                <div className="pb-row"><span>Main bet</span><span>{payoutBreakdown.mainOutcome === 'win' ? `+${(payoutBreakdown.mainPayout - wager).toFixed(2)}` : payoutBreakdown.mainOutcome === 'push' ? 'returned' : `−${wager.toFixed(2)}`}</span></div>
                {payoutBreakdown.sidePayoutTotal > 0 && (
                  <div className="pb-row"><span>Side bets</span><span>+{(payoutBreakdown.sidePayoutTotal - Object.values(sideBetAmts).reduce((a,b)=>a+b,0)).toFixed(2)}</span></div>
                )}
                <div className="pb-row total">
                  <span>Net</span>
                  <span>{payoutBreakdown.netChange >= 0 ? '+' : ''}{payoutBreakdown.netChange.toFixed(2)}</span>
                </div>
              </div>
            )}
          </div>
        </aside>

        {/* ── Right stage ── */}
        <section className="stage">
          <div className="stage-inner">
            <Zone
              title="THE HOUSE"
              subtitle={houseSubtitle}
              dice={houseDice}
              rolling={houseRolling}
              result={houseResult}
              active={houseActive}
              glyph="⬢"
              side="house"
            />

            <VsDivider phase={phase} outcome={outcome} />

            <div className={`player-zone-wrap ${canTapToRoll ? 'tap-ready' : ''}`}
                 onClick={canTapToRoll ? playerRoll : undefined}>
              <Zone
                title="YOU"
                subtitle={playerSubtitle}
                dice={playerDice}
                rolling={playerRolling}
                result={playerResult}
                active={playerActive}
                glyph="◆"
                side="player"
              />
              {canTapToRoll && <div className="tap-hint">↻ TAP TO ROLL</div>}
            </div>

            {/* Result flash banner */}
            {flash && (
              <div className={`flash flash-${flash.type}`}>
                <div className="flash-glyph">
                  {flash.type === 'win' ? '◆◆◆' : flash.type === 'lose' ? '✕' : flash.type === 'push' ? '=' : '!'}
                </div>
                <div className="flash-msg">{flash.msg}</div>
              </div>
            )}
          </div>

          {/* Stage footer: history strip */}
          <HistoryStrip history={history} />
        </section>
      </main>

      {/* ── Bottom rules tab ── */}
      <div className="bottom-strip" onClick={() => setShowRules(true)}>
        <div className="bs-left">
          <span className="bs-title">Cee-Lo</span>
          <span className="bs-tag">Dices Originals</span>
        </div>
        <div className="bs-right">
          <span className="bs-odds">▴ 1,200× MAX</span>
          <span className="bs-fair">Provably Fair ✓</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>

      {showRules && <RulesDrawer onClose={() => setShowRules(false)} />}

      {tweaksOpen && <TweaksPanel vals={tweakVals} onChange={setTweak} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

// ── History strip ─────────────────────────────────────────────
function HistoryStrip({ history }) {
  if (!history.length) return (
    <div className="history-strip empty">
      <span className="hs-label">RECENT ROLLS</span>
      <span className="hs-placeholder">no rounds yet — place your first bet</span>
    </div>
  );
  return (
    <div className="history-strip">
      <span className="hs-label">RECENT</span>
      <div className="hs-scroller">
        {history.map((h) => (
          <div key={h.id} className={`hs-chip hs-${h.outcome}`}>
            <span className="hs-dice">
              {h.house?.kind === 'cee-lo' ? '4·5·6' :
               h.house?.kind === 'trips' ? `${h.house.value}·${h.house.value}·${h.house.value}` :
               h.house?.kind === 'point' ? `P${h.house.point}` :
               h.house?.label?.slice(0, 4) || '—'}
            </span>
            <span className="hs-vs">vs</span>
            <span className="hs-dice">
              {h.player?.kind === 'cee-lo' ? '4·5·6' :
               h.player?.kind === 'trips' ? `${h.player.value}·${h.player.value}·${h.player.value}` :
               h.player?.kind === 'point' ? `P${h.player.point}` :
               h.player?.label?.slice(0, 4) || '—'}
            </span>
            <span className="hs-net">{h.net >= 0 ? '+' : ''}{h.net.toFixed(1)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Rules drawer ──────────────────────────────────────────────
function RulesDrawer({ onClose }) {
  return (
    <div className="drawer-overlay" onClick={onClose}>
      <div className="drawer" onClick={(e) => e.stopPropagation()}>
        <div className="drawer-head">
          <h2>How Cee-Lo works</h2>
          <button className="x-btn" onClick={onClose}>✕</button>
        </div>
        <div className="drawer-body">
          <section>
            <h3>THE LOOP</h3>
            <p>You bet. The House rolls first. If the House doesn't auto-win or auto-lose, it sets a <em>point</em>. You tap to roll your dice, trying to beat it. Higher point wins. Same point = push.</p>
          </section>
          <section className="rules-grid">
            <div className="rule-card rule-hot">
              <div className="rule-badge">INSTANT WIN</div>
              <div className="rule-title">4 · 5 · 6 (Cee-Lo)</div>
              <div className="rule-sub">pays 2:1</div>
            </div>
            <div className="rule-card rule-hot">
              <div className="rule-badge">INSTANT WIN</div>
              <div className="rule-title">Trips (any)</div>
              <div className="rule-sub">pays 3:1 · Trip Sixes 5:1</div>
            </div>
            <div className="rule-card rule-hot">
              <div className="rule-badge">INSTANT WIN</div>
              <div className="rule-title">Pair + 6 (Headcrack)</div>
              <div className="rule-sub">pays 1:1</div>
            </div>
            <div className="rule-card rule-cold">
              <div className="rule-badge">INSTANT LOSS</div>
              <div className="rule-title">1 · 2 · 3 (Ace Out)</div>
              <div className="rule-sub">you bust</div>
            </div>
            <div className="rule-card rule-cold">
              <div className="rule-badge">INSTANT LOSS</div>
              <div className="rule-title">Pair + 1 (Aced Out)</div>
              <div className="rule-sub">you bust</div>
            </div>
            <div className="rule-card rule-neutral">
              <div className="rule-badge">SETS POINT</div>
              <div className="rule-title">Pair + 2/3/4/5</div>
              <div className="rule-sub">odd die = point. higher wins.</div>
            </div>
            <div className="rule-card rule-dead">
              <div className="rule-badge">DEAD ROLL</div>
              <div className="rule-title">No pair, no straight</div>
              <div className="rule-sub">re-roll automatically</div>
            </div>
          </section>
          <section>
            <h3>HIERARCHY (high → low)</h3>
            <ol className="hier-list">
              <li><span>1</span> Trip Sixes (6-6-6)</li>
              <li><span>2</span> Other Trips (5s → 1s)</li>
              <li><span>3</span> Cee-Lo (4-5-6)</li>
              <li><span>4</span> Headcrack (Pair + 6)</li>
              <li><span>5</span> Point 5 · 4 · 3 · 2</li>
              <li><span>6</span> Aced Out (Pair + 1) — loss</li>
              <li><span>7</span> Bust (1-2-3) — loss</li>
            </ol>
          </section>
        </div>
      </div>
    </div>
  );
}

// ── Tweaks panel ──────────────────────────────────────────────
function TweaksPanel({ vals, onChange, onClose }) {
  return (
    <div className="tweaks-panel">
      <div className="tp-head">
        <span>Tweaks</span>
        <button onClick={onClose}>✕</button>
      </div>
      <div className="tp-body">
        <label className="tp-field">
          <span>Animation speed</span>
          <div className="tp-slider-row">
            <input
              type="range" min="0.3" max="3" step="0.1"
              value={vals.animationSpeed}
              onChange={(e) => onChange('animationSpeed', Number(e.target.value))}
            />
            <span className="tp-val">{vals.animationSpeed.toFixed(1)}×</span>
          </div>
        </label>
        <label className="tp-field toggle">
          <span>Show side bets panel</span>
          <input
            type="checkbox"
            checked={vals.showSideBets}
            onChange={(e) => onChange('showSideBets', e.target.checked)}
          />
        </label>
        <label className="tp-field toggle">
          <span>Second betting window (after House point)</span>
          <input
            type="checkbox"
            checked={vals.showSecondWindow}
            onChange={(e) => onChange('showSecondWindow', e.target.checked)}
          />
        </label>
        <label className="tp-field">
          <span>Demo — force outcome</span>
          <select
            value={vals.forceOutcome}
            onChange={(e) => onChange('forceOutcome', e.target.value)}
          >
            <option value="off">Off (real RNG)</option>
            <option value="win">Win</option>
            <option value="lose">Lose</option>
            <option value="push">Push</option>
            <option value="headcrack">Headcrack</option>
            <option value="trips">Trip Sixes</option>
          </select>
        </label>
        <div className="tp-hint">Changes apply on the next round.</div>
      </div>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
